name: rc-sbdd-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify source-data hashes
        run: python scripts/verify_source_data_manifest.py

      - name: Reproduce paper snapshot summaries
        run: python scripts/run_snapshot_smoke.py

      - name: Check leaderboard submission interface
        run: |
          python benchmarks/RC-SBDD-Bench-v1/evaluation/score_submission.py \
            --labels paper_source_data/trans_journal_master_evidence.csv \
            --submission examples/toy/toy_submission.csv \
            --out logs/toy_leaderboard.json
